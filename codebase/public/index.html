<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Chun Wah</title>
    <meta name="robots" content="noindex" />
    <!-- Google Search Console : Google vérifie la racine du domaine, qui sert
         CE fichier — la balise doit donc y être, en plus des pages Next. -->
    <meta
      name="google-site-verification"
      content="niLZpp794Ddf4SHOOQu_whUY0QfevnWDp8fTpITsxHY"
    />
    <!-- Le site vit sous /fr/ et /en/ : la racine ne fait que rediriger.
         En export statique il n'y a ni middleware ni redirection serveur, donc
         cette page tient le rôle (et évite de dépendre d'une règle .htaccess).

         TOUJOURS vers /fr/ : le français est la langue par défaut de l'académie,
         quelle que soit la langue du navigateur. Les anglophones basculent via
         le sélecteur de langue du menu. -->
    <meta http-equiv="refresh" content="0; url=/fr/" />
    <link rel="canonical" href="/fr/" />
  </head>
  <body>
    <p>Redirection vers <a href="/fr/">chunwah.ma/fr</a>…</p>
    <script>
      // Redirection immédiate (le meta refresh reste le filet sans JavaScript).
      location.replace('/fr/');
    </script>
  </body>
</html>
