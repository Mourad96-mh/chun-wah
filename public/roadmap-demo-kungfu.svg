<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Arial Narrow', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f5"/>
      <stop offset="1" stop-color="#f1ece4"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#0e0f11" opacity="0.05"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0e0f11" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect width="1200" height="800" fill="url(#sky)"/>
  <rect width="1200" height="800" fill="url(#dots)"/>

  <!-- Distant mountains: the classic long climb of kung-fu training -->
  <polygon points="0,470 210,250 360,470" fill="#e6dfd4"/>
  <polygon points="150,470 430,180 720,470" fill="#ded6c9"/>
  <polygon points="560,470 860,210 1140,470" fill="#e6dfd4"/>
  <polygon points="920,470 1120,270 1200,360 1200,470" fill="#ded6c9"/>
  <rect x="0" y="470" width="1200" height="330" fill="#efe9e0"/>

  <!-- Title block -->
  <text x="70" y="96" font-size="66" font-weight="700" fill="#c2352b" letter-spacing="6">功夫之路</text>
  <text x="72" y="140" font-size="30" font-weight="700" fill="#17191d" letter-spacing="1">LE PARCOURS DU PRATIQUANT</text>
  <text x="73" y="168" font-size="18" fill="#565b64">Du tout premier cours à la maîtrise — étape par étape.</text>

  <!-- DÉMO ribbon -->
  <g transform="translate(610,150)">
    <rect x="0" y="0" width="130" height="34" rx="17" fill="#17191d"/>
    <text x="65" y="23" font-size="16" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="2">DÉMO</text>
  </g>

  <!-- The winding road -->
  <path d="M110,690 C210,660 260,640 360,610 C470,575 520,530 620,480 C710,435 770,415 860,370 C950,325 1010,280 1090,220"
        fill="none" stroke="#2c2f34" stroke-width="34" stroke-linecap="round"/>
  <path d="M110,690 C210,660 260,640 360,610 C470,575 520,530 620,480 C710,435 770,415 860,370 C950,325 1010,280 1090,220"
        fill="none" stroke="#f4d24b" stroke-width="3" stroke-linecap="round" stroke-dasharray="14 16" opacity="0.85"/>

  <!-- Start marker -->
  <g transform="translate(110,690)">
    <circle r="12" fill="#17191d"/>
    <text x="0" y="44" font-size="15" font-weight="700" fill="#565b64" text-anchor="middle" letter-spacing="1">DÉPART · 始</text>
  </g>

  <!-- Finish: a pagoda on the summit -->
  <g transform="translate(1090,220)" filter="url(#soft)">
    <polygon points="-30,-6 30,-6 20,-20 -20,-20" fill="#9c2820"/>
    <rect x="-16" y="-6" width="32" height="22" fill="#c2352b"/>
    <polygon points="-22,-20 22,-20 14,-34 -14,-34" fill="#c2352b"/>
    <rect x="-10" y="-34" width="20" height="14" fill="#9c2820"/>
    <polygon points="-14,-34 14,-34 0,-48" fill="#c2352b"/>
    <text x="0" y="42" font-size="15" font-weight="700" fill="#9c2820" text-anchor="middle" letter-spacing="1">MAÎTRISE · 師</text>
  </g>

  <!-- ============ STATIONS ============ -->

  <!-- Station 1 -->
  <line x1="110" y1="690" x2="188" y2="560" stroke="#b9b0a2" stroke-width="2"/>
  <g filter="url(#soft)"><rect x="60" y="470" width="256" height="92" rx="12" fill="#ffffff" stroke="#e4ddd1"/></g>
  <text x="80" y="500" font-size="14" font-weight="700" fill="#c2352b" letter-spacing="1">ÉTAPE 1 · CEINTURE BLANCHE</text>
  <text x="80" y="524" font-size="21" font-weight="700" fill="#17191d">Débutant</text>
  <text x="80" y="547" font-size="14" fill="#565b64">Postures, garde et premiers déplacements.</text>
  <g transform="translate(110,690)">
    <circle r="30" fill="#ffffff" stroke="#c9bcab" stroke-width="4"/>
    <text x="0" y="9" font-size="26" font-weight="700" fill="#2c2f34" text-anchor="middle">1</text>
  </g>

  <!-- Station 2 -->
  <line x1="360" y1="610" x2="430" y2="700" stroke="#b9b0a2" stroke-width="2"/>
  <g filter="url(#soft)"><rect x="300" y="694" width="256" height="92" rx="12" fill="#ffffff" stroke="#e4ddd1"/></g>
  <text x="320" y="724" font-size="14" font-weight="700" fill="#c2352b" letter-spacing="1">ÉTAPE 2 · CEINTURE JAUNE</text>
  <text x="320" y="748" font-size="21" font-weight="700" fill="#17191d">Débutant confirmé</text>
  <text x="320" y="771" font-size="14" fill="#565b64">Premiers enchaînements et vocabulaire.</text>
  <g transform="translate(360,610)">
    <circle r="30" fill="#f2c14e" stroke="#d9a52f" stroke-width="4"/>
    <text x="0" y="9" font-size="26" font-weight="700" fill="#5a4410" text-anchor="middle">2</text>
  </g>

  <!-- Station 3 -->
  <line x1="620" y1="480" x2="680" y2="392" stroke="#b9b0a2" stroke-width="2"/>
  <g filter="url(#soft)"><rect x="560" y="300" width="256" height="92" rx="12" fill="#ffffff" stroke="#e4ddd1"/></g>
  <text x="580" y="330" font-size="14" font-weight="700" fill="#c2352b" letter-spacing="1">ÉTAPE 3 · CEINTURE VERTE</text>
  <text x="580" y="354" font-size="21" font-weight="700" fill="#17191d">Intermédiaire</text>
  <text x="580" y="377" font-size="14" fill="#565b64">Formes (taolu) et travail à deux.</text>
  <g transform="translate(620,480)">
    <circle r="30" fill="#4c9a5a" stroke="#377843" stroke-width="4"/>
    <text x="0" y="9" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  </g>

  <!-- Station 4 -->
  <line x1="860" y1="370" x2="800" y2="470" stroke="#b9b0a2" stroke-width="2"/>
  <g filter="url(#soft)"><rect x="660" y="470" width="256" height="92" rx="12" fill="#ffffff" stroke="#e4ddd1"/></g>
  <text x="680" y="500" font-size="14" font-weight="700" fill="#c2352b" letter-spacing="1">ÉTAPE 4 · CEINTURE ROUGE</text>
  <text x="680" y="524" font-size="21" font-weight="700" fill="#17191d">Avancé</text>
  <text x="680" y="547" font-size="14" fill="#565b64">Combat (sanda), armes, sparring encadré.</text>
  <g transform="translate(860,370)">
    <circle r="30" fill="#c2352b" stroke="#9c2820" stroke-width="4"/>
    <text x="0" y="9" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
  </g>

  <!-- Station 5 -->
  <line x1="1090" y1="220" x2="1020" y2="150" stroke="#b9b0a2" stroke-width="2"/>
  <g filter="url(#soft)"><rect x="850" y="66" width="256" height="92" rx="12" fill="#ffffff" stroke="#e4ddd1"/></g>
  <text x="870" y="96" font-size="14" font-weight="700" fill="#c2352b" letter-spacing="1">ÉTAPE 5 · CEINTURE NOIRE</text>
  <text x="870" y="120" font-size="21" font-weight="700" fill="#17191d">Maître</text>
  <text x="870" y="143" font-size="14" fill="#565b64">Autonomie, style personnel, transmission.</text>
  <g transform="translate(1090,220)">
    <circle r="30" fill="#1a1a1a" stroke="#000000" stroke-width="4"/>
    <text x="0" y="9" font-size="26" font-weight="700" fill="#f4d24b" text-anchor="middle">5</text>
  </g>

  <!-- Footer credit -->
  <text x="70" y="778" font-size="14" fill="#8a8378">Académie Chun Wah · exemple indicatif.</text>
</svg>
