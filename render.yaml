# Render Blueprint pour Chun Wah — l'API Express UNIQUEMENT.
#
# Architecture (split, comme para d'or) :
#   • Frontend → Next.js export statique (codebase/), buildé dans `out/`, hébergé sur Hostinger.
#   • Backend  → cette API Express (codebase/server/), hébergée ici sur Render.
#   • Données  → MongoDB Atlas + Cloudinary (externes).
#
# Déploiement : dashboard.render.com → New → Blueprint → connecter ce repo → Apply.
# Les secrets sont marqués `sync: false` — régler leurs vraies valeurs dans le dashboard Render.
services:
  - type: web
    name: chunwah-api
    runtime: node
    rootDir: codebase/server
    # $7/mo, toujours éveillé (pas de cold start sur le login/admin). Passer à
    # `free` pour tester gratuitement, mais free s'endort après 15 min → ~50s de réveil.
    plan: starter
    region: frankfurt # le plus proche du Maroc ; options : oregon, ohio, virginia, singapore
    branch: main
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true # redéploie à chaque push sur la branche connectée
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Origines autorisées à appeler l'API (le site sur Hostinger + le dev local).
      - key: CORS_ORIGIN
        value: https://chunwah.ma,https://www.chunwah.ma,http://localhost:3000
      # --- Régler ces vraies valeurs dans le dashboard Render (ne pas commit) ---
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
